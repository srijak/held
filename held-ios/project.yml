name: Held
options:
  bundleIdPrefix: com.srijak
  deploymentTarget:
    iOS: "17.0"

targets:
  Held:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Held
    info:
      path: Held/Info.plist
      properties:
        CFBundleDisplayName: Held
        NSMicrophoneUsageDescription: Held listens to your voice to detect the pitch you're singing. Audio never leaves the device.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.srijak.held
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
